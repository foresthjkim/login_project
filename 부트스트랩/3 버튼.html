<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다운로드하여 부트스트랩 사용하기</title>
    <!-- 링크 우선순위는 순서대로 적용된다. -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <!-- <link rel="stylesheet" href="./css/bootstrap.css"> -->

</head>
<body>
    <button class="btn btn-warning">다운로드</button>
    <h3>Button tags 3가지 사용하는 방법</h3>
    <p>1.button 버튼태크, 2.a태그, 3.input에 버튼 클래스를 적용할 수 있다.</p>
    <button type="submit" class="btn btn-primary">전송</button>
    <a href="#" class="btn btn-info" role="button">Link</a>
    <input type="reset" value="지우기" class="btn btn-success">
    <hr>

    <p>아웃라인을 형식을 지정할 수 있다: .btn-outline- </p>
    <p>기본 변경 클래스를 " .btn-outline- "으로 변경해서 버튼에 있는 배경색을 지울 수 있다.</p>
    <button type="submit" class="btn btn-outline-primary">전송</button>
    <a href="#" class="btn btn-outline-info" role="button">Link</a>
    <input type="reset" value="지우기" class="btn btn-outline-success">
    <hr>

    <p>버튼의 크리를 조정할 수 있다: .btn-outline- </p>
    <p>버튼 크리를 .btn-lg 나 .btn-sm 을 적용해 변경할 수 있다.</p>
    <button type="submit" class="btn btn-outline-primary btn-lg">전송</button>
    <a href="#" class="btn btn-outline-info btn-sm" role="button">Link</a>
    <input type="reset" value="지우기" class="btn btn-outline-success">
    <hr>

    <p>비활성화 상태 : disabled </p>
    <button type="submit" class="btn btn-primary" disabled>전송</button>


    <script src="./jss/bootstrap.bundle.min.js"></script>
    
</body>
</html>
