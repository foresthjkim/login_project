<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신상정보</title>
</head>
<body>
     <form action="#" enctype="multipart/form-data">
        <fieldset>
            <legend>신상정보</legend>

            <ol>
                <li>
                    <label for="name">이름</label>
                    <input type="text" name="name" id="name" required placeholder="이름">
                </li>
                <li>
                    <label for="emal">이메일</label>
                    <input type="email" name="email" required placeholder="example@domain.com">
                </li>
                <li>
                    <label for="tel">휴대폰 번호</label>
                    <input type="tel" name="mobile" id="mobile" placeholder="01012345678">
                </li>
            </ol> 
            
        </fieldset>
            
    <p><input type="submit" value="제출"> <input type="reset" value="지우기"></p>
    </form>

</body>
</html>
