    <h1>집성목(集成木)</h1>
    <img src="./images/butcher_block.jpg" alt="집성목" width="500"><br>
    <p>나무를 적당하게 작고 일정한 크기와 형태로 절단한 뒤 이를 접착제를 이용해서 접합해 만든 목재이다.
        조각을 이어 붙인 것이기에 원목보다 더 넓은 판재를 만드는 것도 당연히 가능하다. 또한, 원목과 마찬가지로 나무결 무늬가 그대로 보인다는 장점도 있다. 위의 사진처럼 나무가 연결된 모습도 그대로 보인다. 영어로는 'butcher block' 으로 부른다.</p>
