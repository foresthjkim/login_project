
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>transform</title>
    <link rel="stylesheet" href="./CSS/21transform.css">
</head>
<body>
    <h1>transform 속성</h1>

    <p>박스를 회전(rotate), 확대 축소(scale), 이동(translate), 찌그러뜨리기(skew)할 수 있게 함</p>
        <ul>
            <li>transorm:translate(10px, 10px) - 평행이동</li>
            <li>transorm:rotate(45deg) - 회전</li>
            <li>transorm:scale(2, 1.2) - 크기변환</li>
            <li>transorm:skew(20deg, 10deg) - 비틀기 변환</li>
        </ul>

    <div class="t1">원래박스</div>
    <div class="t2">이동했어요!</div>
    <div class="t3">회전했나요?</div>
    <div class="t4">크기가 변했나요?</div>
    <div class="t5">찌그러졌죠! 헉!헉!</div>

    
</body>
</html>
