<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미션-선택자</title>

    <style>
        /* 전체 선택자 */
        * {
            margin: 0;
        }
         /* id 선택자는 # */
        #container {
            width: 900px;
        }
         /* <h1> 선택자 */
        h1 {
            color: blue;
        }
         /* <h1>바로 다음 인접 선택자, 그리고 <p>요소 안에 있는 <span> */
        h1+p>span {
            color: red;
        }
         /* bamboo class 선택자 */
        .bamboo {
            background-color: orange;
        }
         /* <ul>li>h2 요소 안에 있는 span 선택자 */

        ul>li>h2>span {
            color: rgb(0, 255, 157);
        }
    

    </style>

</head>
<body>
     <div id="container" >
        <h1>건강해지는 차</h1>
        <p>머리와 피부에 좋은 차는 어떤 것일까. <span>차의 종류</span>에 대해 알아보도록 합니다.</p>

        <ul>
            <li class="bamboo">
                <h2>대나무차 <span>15,000원</span></h2>
                <p>얼굴에 물을 주는 효과가 있다.</p>
            </li>
            <li class="persimmon">
                <h2>감입차 <span>14,000원</span></h2>
                <p>빈혈있는 사람에게 효과가 있다.</p>
            </li>
            <li class="cassiaseed">
                <h2>결명자차 <span>20,000원</span></h2>
                <p>눈을 밝혀주는 효과가 있다.</p>
                <p>보리차와 비슷하나 맛이 더 은은하고 구수하며 블그스름하다.</p>
            </li>
        </ul>
    </div>

</body>
</html>
