
<!DOCTYPE html>
<html lang="ko"> 
<head>
    <meta charset="UTF-8"> 
   
    <title>폼_input</title>
</head>
<body>

    <form action="/action_page.php" method="get">          <!-- W3Schools 사이트 이용하여 테스트 가능: 서버가 존재하기 때문-->
        <p>이름 : <input type="text" name="name"></p>       <!--name: 서버이름, 나중에 백앤드 배울때 서버이름 표시예정-->
        <p>학번 : <input type="text" name="number"></p>
        <p>패스워드 : <input type="password" name="pass"></p>
        <p>성별 :
            <input type="radio" name="gender" value="male">남성   <!-- 래디오 버튼 같은 경우에는 "name=그룹이름" 을 명기해주어야 여러개 버튼 중에 하나만 선택 되어짐-->
            <input type="radio" name="gender" value="female">여성
        </p>
        <p>
            과일선택 : 
            <input type="checkbox" name="fruits" value="apple">사과     <!-- 체크박스는 name이 달라도 된다.-->
            <input type="checkbox" name="fruits" value="pear">배
            <input type="checkbox" name="fruits" value="grape">포도
        </p>
        <p>
            <input type="submit" value="전송">
        </p>

    </form>
    
</body>
</html>
