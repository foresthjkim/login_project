
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
  
    <title>mark요소</title>

</head>
<body>
    <h2>mark 요소</h2>
    <div>
        <p>
            &lt;마크요소&gt;는 글 내용에서 주의 깊게 볼 <mark><em>텍스트 부분을 강조 처리</em></mark>하기 위한 요소입니다.
        </p>
        <p>
            특히, 검색 사이트에서 <mark><strong>특정 키워드를 검색하면 찾고 있던 키워드만 강조</strong></mark>되어 나타내는 것이 &lt;mark&gt;요소의 좋은 예입니다.
        </p>

    </div>

</body>
</html>
