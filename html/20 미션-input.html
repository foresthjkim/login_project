
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미션-input</title>

</head>
<body>
    <h1>input 요소</h1>

    <form action="#" enctype="multipart/form-data">
        <fieldset>
            <legend>회원가입</legend>

            <p>아이디: <input type="text" name="id"></p>
            <p>비밀번호: <input type="text" name="pass"></p>
            <p>매일수신 여부: 
                <input type="radio" name="email_receive" value="yes" checked>예
                <input type="radio" name="email_receive" value="no">아니오
            </p>
            <p>관심 분야:
                <input type="checkbox" name="interest_check" value="HTML" checked>HTML
                <input type="checkbox" name="interest_check" value="CSS">CSS
                <input type="checkbox" name="interest_check" value="Javascript">Javascript
            </p>
            <p>
                <input type="submit" value="전송">
                <input type="reset" value="취소">
                <input type="button" value="확인">
                <input type="image" src="./images/search.gif" alt="검색">
            </p>
            <p>파일 올리기: 
                <input type="file" name="excelFile" accept="application/vnd.ms-excel" >
                <!-- 파일 형식에 따라 업로드 조건을 주고자할때:
                 accept="image/jpeg,image/gif" 또는 accept="application/pdf" 또는 accept="application/vnd.ms-excel" 또는 accept=".xls, .xlsx" -->
            </p>
        </fieldset>
    </form>
    
</body>
</html>
