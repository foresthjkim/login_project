
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>button 사용예제</title>
</head>
<body>
    <form action="#">
        <p>물품가격: <input type="text" name="price" id="price"></p>
        <p>수량: <input type="text" name="number" id="number"></p>
        <p><input type="button" value="계산기" onclick="sum()"></p>
    </form>
    <script>                                                            //--Javascript 사용해서 id를 부여하여 Element를 가져온다.
        function sum() {
            var com1 = document.getElementById("price").value;
            // alert (com1)

            var com2 = document.getElementById("number").value;
            // alert (com2)

            var sum = com1 * com2;
            alert(sum)
        }

    </script>
    
</body>
</html>
