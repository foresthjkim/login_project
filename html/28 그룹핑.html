
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>그룹핑 - div, span</title>

    <style>
        /* 주석입니다 */
        p {
            background-color:yellow;
            border: 2px solid red;

        }
    </style>

</head>
<body>
    <!-- div: 많이 사용하는 블록 / margin-top or bottom: div 와 div 사이 칸(공백)을 띄우고 싶을때-->
    <div style="border: 1px solid red;">
        <h2>사자</h2>
        <p>사자는 아프리카에 살며, 강한 다리와 턱, <span style="color: brown;" >긴 송곳니</span>를 가지고 있다.</p>
    </div>

    <div style="border: 1px solid blue; margin-top: 50px;">
        <h2>코알라</h2>
        <p>코알라는 호주 동부에 살며, 손톱처럼 생긴 <span style="color: blue;"> 커다란 코</span>와 발을 가지고 있으며, 항상 나무에 메달려 있다.</p>
    </div>


    
</body>
</html>
