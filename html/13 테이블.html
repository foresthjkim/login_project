
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>테이블</title>
</head>
<body>
    <h1>표 만들기</h1>

    <h2>1행 1열 표 만들기</h2>
    <table border="1">
        <tr>
            <td>1행 1열</td>
        </tr>
    </table>
    <hr>

    <h2>1행 2열 표 만들기</h2>
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
    </table>
    <hr>

    <h2>2행 1열 표 만들기</h2>
    <table border="1">
        <tr>
            <td>1행 1열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
        </tr>
    </table>
    <hr>

    <h2>2행 2열 표 만들기</h2>
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
            <td>2행 2열</td>
        </tr>
    </table>
    <hr>

    <h2>2행 3열 표 만들기</h2>
    <p>2행 1열과 2행 1열을 합시시요.</p>
    <p>1행 2열과 1행 3열을 합시시요.</p>
    <table border="1">
        <tr>
            <td rowspan="2">1행 1열</td>
            <td colspan="2">1행 2열</td>
            <!-- <td>1행 3열</td> -->
        </tr>
        <tr>
            <!-- <td>2행 1열</td>  -->
            <td>2행 2열</td>
            <td>2행 3열</td>
        </tr>
    </table>
    <hr>

    <!-- 3행 4열 행 및 영 병합 테스트 하기 -->

    <h2>3행 4열 표 만들기</h2>
    <table border="1">
        <caption>표의 제목입니다.</caption>
        <thead>                                           <!--표 해드 컬럼 제목 -->
                <tr>                                    
                    <th>1열</th>    
                    <th>2열</th>
                    <th>3열</th>
                    <th>4열</th>
                </tr>
        </thead>

        <tfoot>                                          <!--표 마지막 행 -->
                <tr>
                    <td>요약</td>
                    <td colspan="3">3행 2열</td>  
                </tr>
        </tfoot>

        <tbody>                                          <!--표 body -->
                <tr>
                    <td>1행 1열</td>
                    <td rowspan="2">1행 2열</td>
                    <td>1행 3열</td>
                    <td>1행 4열</td>
                </tr>
                <tr>
                    <td>2행 1열</td>
                    <!-- <td>2행 2열</td>  -->
                    <td>2행 3열</td>
                    <td>2행 4열</td>
                </tr>
                <tr>
                    <!-- <td>3행 1열</td>  -->
                    
                    <!-- <td>3행 3열</td>   -->
                    <!-- <td>3행 4열</td>   -->
                </tr>
        </tbody>

    </table>

    
</body>
</html>
