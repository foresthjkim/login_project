
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미션-테이블 만들기</title>
    
</head>
<body>
    <h1>표의 구조 정의하기</h1>

    <table border="1">
        <caption>요안도라 객실</caption>

        <thead>
            <th>방 이름</th>
            <th>대상</th>
            <th>크기</th>
            <th>가격</th>
        </thead>

        <tfoot>
            <tr>
                <td colspan="4">바깥체 전체를 렌트합니다.</td>
            </tr>
        </tfoot>

        <tbody>
            <tr>
                <td>유채방</td>
                <td>여성 도미토리</td>
                <td rowspan="3">4인실</td>
                <td rowspan="3">1인 20,000원</td>
                
            </tr>

             <tr>
                <td rowspan="2">동백방</td>
                <td>동성 도미토리</td>
                <!-- <td>2행 3열</td>  -->
                <!-- <td>2행 4열</td>  -->
            </tr>

            <tr>
                <!-- <td>동백방</td>  -->
                <td>가족 1팀</td> 
                <!-- <td>2인실</td>  -->
                <!-- <td>3행 4열  -->
            </tr>

             <tr>
                <td>천혜향방</td>
                <td>연인, 부부</td>
                <td>2인실</td> 
                <td>1인 50,000원</td> 
            </tr>

        </tbody>


    </table>

    
</body>
</html>
