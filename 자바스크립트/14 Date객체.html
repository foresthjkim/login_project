
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>20251230: Date 객체</title>
</head>
<body>
    <h2>내장객체: 브라우저의 자바스크립트 엔진에 내장된 객체를 말하며, 필요한 경우 객체를 생성해 사용할 수 있다.</h2>
    <p>Date객체 - 특정한 날짜로 객체 생성하기</p>
    <script>
        var d1 = new Date(2025,11,30,0,0,0);    // 인수로 넣을때에는 월 Month = 0 ~11까지이기 때문에 "Current Month = Current Month - 1" 을 해 주어야 함
        var d2 = new Date("December 30, 2025 10:18:00");
        var d3 = new Date("2025, DECEMBER 30, 10:18:00");
        var d4 = new Date();

        document.write(d1+"<br>");
        document.write(d2,'<br>');
        document.write(d3,"<br>");
        document.write(d4,"<br>");
    </script>
    <hr>

    <h2>날짜를 특정 문자열 형태로 변환</h2>
    <p>toXXXString() 형태의 메서드는 날짜를 특정 문자열 형태로 변환해서 사용된다. 다양한 문자열로 변환하는 출력 예</p>

    <script>
        var today = new Date();
        document.write("var today = new Date()" + "<br>");
        document.write("today.toDateString() : ", today.toDateString() + "<br>");
        document.write("today.toISOString() : ", today.toISOString() + "<br>");
        document.write("today.toJSON() : " + today.toJSON() + "<br>");
        document.write("today.toLocaleDateString() : " + today.toLocaleDateString() + "<br>");
        document.write("today.toLocaleTimeString() : " + today.toLocaleTimeString() + "<br>");
        document.write("today.toLocaleString() : " + today.toLocaleString() + "<br>");
        document.write("today.toString() : " + today.toString() + "<br>");
        document.write("today.toTimeString() : " + today.toTimeString() + "<br>");
        document.write("today.toUTCString() : " + today.toUTCString() + "<br>");
    </script>
    <hr>

    <h2>현재 날짜 / 시간 정보</h2>
    <script>
        document.write ("<h1>현재 날짜/시간 정보</h1>")
        var today = new Date();
        document.write(today+"<br>")

        var nowMonth = today.getMonth()+1;
        document.write(nowMonth+"월 ")
        var nowDate = today.getDate();
        document.write(nowDate+"일 ");
        var nowDay = today.getDay();
       //document.write(nowDay +"일");                // 요일: 일요일(0) ~ 6(토요일_까지 요일을 숫자로 출력
        switch(nowDay) {
            case 0: document.write("일요일");break;
            case 1: document.write("월요일");break;
            case 2: document.write("화요일");break;
            case 3: document.write("수요일");break;
            case 4: document.write("목요일");break;
            case 5: document.write("금요일");break;
            default: document.write("토요일");          // 토요일인 경우: default or case 6 로 사용해도 됨
        }

        var nowHours = today.getHours();
        document.write(nowHours+" 시 ");
        var nowMinutes = today.getMinutes();
        document.write(nowMinutes+"분 ");
        var nowMillisec = today.getMilliseconds();
        document.write(nowMillisec+"초"+"<br>");

        document.write("<h3>1970년 1월 1일 이후 경과 시간을 밀리초로 제공</h3>");
        var nowTime = today.getTime();
        document.write(nowTime+"밀리초 ");

        document.write("<h3>날짜 바꾸기</h3>");
        today.setMonth(1);                          //2월 2025년 (1월: 0 ~ 12월 11까지 값)
        document.write(today+"<br>");
        today.setDate(25);                       
        document.write(today+"<br>");
    </script>
    <hr>
    <h2>구입한지 30일이 지난 물건 교환 불가</h2>
    
    구입날짜:
    <input type="date" id="pdate">
    <button onclick="checkDate()">검사</button>
    
    <script>
        function checkDate() {
            var s = document.getElementById("pdate").value;
            var pdate = new Date(s);
            var today = new Date();
            var diff = today.getTime() - pdate.getTime();
            var days = Math.floor(diff / (1000 * 60 * 60 * 24));      // 1초: 1000(millsec) 

            if (days>30) {
                alert("구매한지 "+days+"일로 교확가능기간 30일이 이 지났기 때문에 교환이 불가능합니다.")
            }
        }
    </script>
    <hr>
    <h2>카운트 다운 타임어 만들기: 내년도 신정까지 남은 시간</h2>

    <div id="remaining"></div>
    <script>
        function datesUntilNewYear() {
            var now = new Date();
            var NewYear = new Date('January 1,' + (now.getFullYear()+1));   // 2026.1.1
            var diff = NewYear - now;

            diff = diff / 1000;                         //1초 = 1000
            var seconds = Math.floor(diff % 60);
            diff = diff / 60;
            var minutes = Math.floor(diff % 60);        //분
            diff = diff / 60;
            var hours = Math.floor(diff % 24);          //시간
            diff = diff / 24;
            var days = Math.floor(diff);                //일

            var outStr = "내년도 신정까지 " + days + "일," + hours + "시간, " + minutes;
            outStr += "분," + seconds + "초" + " 남았습니다.";

            document.getElementById("remaining").innerHTML = outStr;
            // 1초가 지나면 다시 함수를 호출한다.
            setTimeout("datesUntilNewYear()",1000);
        }
        // 타이머를 시작한다.
        datesUntilNewYear();
    </script>
    <hr>

    <h2>디지털 시계를 만들기: HH:MM:SS / ss초는 증가하게 출력</h2>
    <div id="clock"></div>

    <script>
        function DigitalClock() {
            var now = new Date();
            var s = now.getHours() + ":" + ("0" + now.getMinutes()).slice(-2) + ":" + ("0" + now.getSeconds()).slice(-2);   
            // 분, 초가 항상 2자리로 표현하기위해서는 예 ("0" + now.getMinutes()).slice(-2)) 를 사용한다.

            document.getElementById("clock").innerHTML = s;
            setTimeout("DigitalClock()",1000);
        }
        DigitalClock();
    </script>

    
</body>
</html>
