
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미션 - 삼항 연산자: 조건식? 실행문 : 실행문</title>
</head>

<body>
    <h2>삼항 연산자를 사용 (조건식? 실행문 : 실행문): 입력창(prompt)을 받아서 경고창 (alert) 출력하기</h2>
    <script>
        var age = prompt("나이를 입력하세요", "만나이로 입력합니다.");
        age>=20? alert("당신은 성인입니다.") : alert("당신은 미성년자 입니다.");
    </script>
    <hr>

    <h2>미션: 입력값을 받아 덧셈 계산하기</h2>
    <script>
        var a = prompt("정수를입력하세요")

    </script>
    
</body>
</html>
