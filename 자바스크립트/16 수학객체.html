
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>20251230 수학객체</title>
</head>
<body>
    <script>
        document.write("<h2>Math 객체 기본 메서드 사용법</h2>");
        var maxNum = Math.max(50, 70, 90);
        document.write(maxNum+"<br>");
        var minNum = Math.min(50,70,90);
        document.write(minNum+"<br>");

        var roundNum = Math.round(7.5);
        document.write("반올림 : "+roundNum+"<br>");

        var ceilNum = Math.ceil(7.5);
        document.write("올림 : "+ceilNum+"<br>");

        var absNum = Math.abs(-7);
        document.write("절대값 : "+absNum+"<br>");

        // var randomNum = Math.random()*10;    // 갑 확인할것: 0 - 9까지 발생
        // var randomNum = Math.random()*11;    // 값 확인할것: 0 - 10까지 발생
        // var randomNum = Math.floor(Math.random()*10)+1; // 1 - 10까지의 값을 발생하고자 할때
        var randomNum = Math.floor(Math.random()*31);  // 1-30까지 값 발생하고자 할때
        //120 ~ 150까지의 난수발생
        var randomNum = Math.floor(Math.random()*31)+120;
        document.write("난수 : "+randomNum+"<br>");   // 0.1 ~ 0.99 사이 값만 발생함
    </script>
    <hr>

    <h2>랜덤 이미지 출력: 버튼을 클릭하면 이미지가 교체됩니다.</h2>
    <img id="carimg" src="./images/auto1.jpg" alt="자동차">
    <hr>
    <button onclick="imgchange()";>자동차 이미지 교체하기</button>
    <script>
          function imgchange() {
            var imgNum = Math.floor(Math.random()*4)+1;
            document.getElementById("carimg").src="./images/auto"+imgNum+".jpg";
             
        }
    </script>
    
</body>
</html>
