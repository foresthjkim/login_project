
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이벤트 처리: 이벤트 핸들러</title>
</head>
<body id="target" onload="onLoadDoc();">
    <h2>onclick 이벤트</h2>
    <form action="#">
        <input type="radio" name="c1" value="v2" onclick="changeColor('lightblue')">파랑색
        <input type="radio" name="c1" value="v2" onclick="changeColor('lightgreen')">녹색
    </form>
    <script>
        function changeColor(v) {
            document.getElementById("target").style.backgroundColor = v;
        }
    </script>
    <hr>
    <h2>onload 이벤트</h2>
    <script>
        function onLoadDoc() {
            // alert("문서가 로드 되었습니다.")
            // document.body.style.backgroundColor = "lightblue";
        }
    </script>
    <hr>
    <h2>onchange 이벤트</h2>
    영어단오: <input type="text" id="name" onchange="sub()">
    <p>입력필드를 벗어나면 대문자로 변경됩니다.</p>
    <script>
        function sub() {
            var x = document.getElementById("name")
            x.value = x.value.toUpperCase(); 
        }
    </script>
    <hr>
    <h2>onmouseover / onmouseout 이벤트</h2>
    <div
        style="background-color:yellow; width: 500px"
        onmouseover="onMouseIn(this)"
        onmouseout="onMouseOut(this)"
    >
        마우스를 이 요소 위에 이동하세요 <br>
        (마우스 오버시 빨강색 표시 / 마우스 이동시 경계선 색깔 표시 안함)
    </div>
    <script>
        function onMouseIn(elem) {
            elem.style.border = "2px solid red";
        }
        function onMouseOut(elem) {
            elem.style.border = "";
        }
    </script>
    <hr>
    <h2>onmousedown(버튼 클릭) / onmouseup 이벤트</h2>
    <button 
        onmousedown="onButtonDown(this)"
        onmouseup="onButtonUp(this)"
    >
    마우스를 클릭하여 버튼을 눌러보세요!
    </button>
    <script>
        function onButtonDown(elem) {
            elem.style.color='red';
        }
        function onButtonUp(elem) {
           // elem.style.color='black';
            elem.style.color='';
        }
    </script>
    <hr>

    <h2>계산기 예제</h2>
    <form action="#">
        display <input id="display" value="0" size="18">
        <br>
        <input type="button" value="    7    " onclick="add('7')">
        <input type="button" value="    8    " onclick="add('8')">
        <input type="button" value="    9    " onclick="add('9')">
        <input type="button" value="    /    " onclick="add('/')">
        <br>
        <input type="button" value="    4    " onclick="add('4')">
        <input type="button" value="    5    " onclick="add('5')">
        <input type="button" value="    6    " onclick="add('6')">
        <input type="button" value="    *    " onclick="add('*')">
        <br>
        <input type="button" value="    1    " onclick="add('1')">
        <input type="button" value="    2    " onclick="add('2')">
        <input type="button" value="    3    " onclick="add('3')">
        <input type="button" value="    -    " onclick="add('-')">
        <br>
        <input type="button" value="    0    " onclick="add('0')">
        <input type="button" value="    +    " onclick="add('+')">
        <br>
        <input type="button" value="    Clear    " onclick="clearDisplay()">
        <input type="button" value="    Enter    " name="enter" onclick="compute()">
    </form>
    <script>
        var expression="";           // expression="" : 타입을 문자열로 정의해서 입력된 숫자가 옆으로 추가되게 하기위함
        function add(character) {
            expression += character
            document.getElementById("display").value = expression
        }
        function compute() {
            document.getElementById("display").value = eval(expression);  //eval(): 내장 개체함수로 사칙연산 자동계산
        }
        function clearDisplay() {
            expression=""                                                   //중요: expression도 초기화 해 주어야 함
            document.getElementById("display").value = "0";
        }

    </script>



    
</body>
</html>
