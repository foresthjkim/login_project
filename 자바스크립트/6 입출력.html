<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자바스크립트 입출력</title>

</head>
<body>
    <h2>alert() 함수 : 사용자에게 경고를 하는 윈도우를 화면에 띄우는 함수이다.</h2>
    <script>
        alert("이것이 alert()입니다.")
    </script>
    <hr>

    <h2>confirm() 함수</h2>
    <p>사용자에게 어떤 사항을 알려주고 확인이나 취소를 요구하는 원도우화면을 띄운다.
        사용자가 확인을 클릭하면 true를 반환하고 그렇지 않으면 false를 반환단다.
    </p>
    <script>
        var user = confirm("confirm()은 '확인' or '취소'를 클릭하면 사용자의 답변을 전달합니다.");
    </script>
    <hr>

    <h2>prompt() 함수</h2>
    <p>사용자에게 어떤 사항을 알려주고 사용자가 답변을 입력 할 수 있는 윈도우 화면에 띄운다.
        사용자가 입력한 내용을 문자열로 반환한다.
    </p>
    <p>prompt("질문", "기본 응답")</p>
    <script>
        var age = prompt("나이를 입력하세요", "만나이로 입력합니다.");
    </script>
    <hr>

    <h2>document.write : 윈도우에 새로 쓴다.</h2>
    <button type="button" onclick="func()">클릭하세요!</button>
    <script>
        function func() {
            document.write("페이지가 적재된 후에 write()를 사용하면 다시 씌여집니다.");
        }
    </script>




    
</body>
</html>
