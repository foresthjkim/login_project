
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미션: 입력값을 받아 덧셈 계산하기</title>
</head>

<body>
    <h3>미션: 입력값을 받아 덧셈 계산하기 - 2개의 정수를 받아서 덧셈을 하고, 그 결과를 돌려주는 자바스크립트 프로그램을 작성</h3>
    <p>parseInt() - 문자열을 숫자로 변환한다.</p> 
    <p>string()- 숫자를 문자열로 변환한다.</p>

    <script>
        var a = prompt("a.정수를입력하세요", "정수로")
        var b = prompt("b.정수를입력하세요", "정수로")
        var result = parseInt(a) + parseInt(b)
        document.write(result, "<br>")
    </script>
    <hr>



</body>
</html>
