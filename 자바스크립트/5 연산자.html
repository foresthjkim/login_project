
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연산자 (2025/12/26)</title>

</head>
<body>
    <h3>연산자</h3>
    <script>
        var x = 10;
        var y = 20;

        document.write(x + y + "<br>");
        document.write(x - y + "<br>");
        document.write(x * y + "<br>");
        document.write("나누기 x/y: " + x / y + "<br>");
        document.write("나누기 y/x: " + y / x + "<br>");
        document.write("x%y 나머지: " + x % y + "<br>");
        document.write("y%x 나머지: " + y % x + "<br>");
    </script>
    <hr>

    <h3>산술연산자 (증감 +)</h3>
    <script>
        var x = 10;
        document.write("++x 예: 이벤트 먼저 적용 " + ++x + "<br>")
        document.write("++x 예: " + ++x + "<br>")

        x = 10;
        document.write("x++ 예: 다음 이벤트부터 적용 " + x++ + "<br>")
        document.write("x++ 예: " + x++ + "<br>")
    </script>
    <hr>

    <h3>산술연산자 (증감 -)</h3>
    <script>
        var num1 = 10;
        var num2 = 20;
        var result;

        num1--;
        document.write("num1-- 예: " + num1 + "<br>")
        
        num1++;
        document.write(num1, "<br>")

        result=num2++
        document.write(result, "<br>")

        result=++num2;
        document.write(result, "<br>")
    </script>
    <hr>

    <h3>복합 대입 연산자</h3>
    <script>
        var num1 = 10;
        var num2 = 3;

        num1+=num2;
        document.write(num1, "<br>")
        
        num1-=num2;
        document.write(num1, "<br>")

        num1*=num2;
        document.write(num1, "<br>")

        num1%=num2;
        document.write(num1, "<br>")
    </script>
    <hr>

    <h3>문자결합 연산자</h3>
    <script>
        var t1="학교종이";
        var t2="땡땡땡";
        var t3=8282;
        var t4="어서 모이자";
        var t5=9292;
        var result;
        var result1;

        result=t1+" "+t2+" "+t3+" "+t4;
        result1=t3+t5;
        document.write("문자결합 예 t1+t2+t3+t4: ", result, "<br>")
        document.write("산술연산자 예 t3+t5: ",result1)
    </script>
    <hr>

    <h3>비교 연산자</h3>
    <script>
        var x=10;
        var y=20;

        document.write((x>y) + "<br>");
        document.write((x<y) + "<br>");
        document.write((x==y) + "<br>");
        document.write((x!=y) + "<br>");

        y="10";
        document.write((x==y) + "<br>");
        document.write((x!=y) + "<br>");
        document.write("x===y 는 데이터 형까지 체크 :" + (x===y) + "<br>");
    </script>
    <hr>

    <h3>논리 연산자: &&(and), ||(or)</h3>
    <script>
        var x=3;
        var y=4;
        
        document.write((x==3) && (y==4), "<br>");
        document.write((x==3) && (y==7), "<br>");
        document.write((x==3) || (y==4), "<br>");
        document.write((x==3) || (y==10), "<br>");
        document.write((x==20) || (y==10));
    </script>
    <hr>

    <h3>연산자 우선순위</h3>
    <script>
        var a=10;
        var b=20;
        var m=30;
        var n=40;

        var result;
        result = a>b || b>m || m>n;
        document.write(result, "<br>");

        result = a>b || b>=m || m<=n;
        document.write(result, "<br>");

        result = a>=b && b>=m && m<=n;
        document.write(result, "<br>");

        result = a<=b && b<=m && m<=n;
        document.write(result, "<br>");

        result = !(a>b);
        document.write(result, "<br>");
    </script>
    <hr>

    <h3>삼항 조건 연산자: a>b? " " : " " </h3>
    <script>
        var a=10;
        var b=3;

        var result= a>b? "JavaScript" : "Hellow";
        document.write(result, "<br>")

        var result= a<b? "JavaScript" : "Hellow"
        document.write(result)
    </script>
    <hr>


    
</body>
</html>
