
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도전미션 : 1초마다 배경색 바뀜</title>
</head>
<body>

    <h2>디지털 시계를 만들어서 1초마다 배경색 변경: HH:MM:SS / ss초는 증가하게 출력</h2>
    <div id="clock"></div>

    <script>
        function DigitalClock() {
            var now = new Date();
            switch(now.getSeconds()%2) {
                case 0: document.bgColor = "yellow"; break;
                case 1: document.bgColor = "lightgreen"; break;
            }
            var s = "현재시간: " + now.getHours() + "시" + ("0" + now.getMinutes()).slice(-2) + "분" + ("0" + now.getSeconds()).slice(-2) + "초";   
            // 분, 초가 항상 2자리로 표현하기위해서는 예 ("0" + now.getMinutes()).slice(-2)) 를 사용한다.

            document.getElementById("clock").innerHTML = s;
            setTimeout("DigitalClock()",1000);
        }
        DigitalClock();
    </script>
    
</body>
</html>
