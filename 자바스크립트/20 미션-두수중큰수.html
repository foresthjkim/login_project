
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미션 : 두수를 입력받아 큰 수 출력하기</title>
</head>
<body>
    <h2>두수를 입력받아 큰 수 출력하기 - Math.max(...)객체사용</h2>
    <script>
        var x;
        var y;
        var input;
        
        input = prompt ("정수를 입력하세요","정수로");
        x = parseInt(input);

        input = prompt ("정수를 입력하세요", "정수로");
        y = parseInt(input);

        document.write(Math.max(x,y));

    </script>

    
    
</body>
</html>
