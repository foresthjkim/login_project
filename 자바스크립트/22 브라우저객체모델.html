
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BOM:Browser Objective Model 브라우저 객체 모델</title>
</head>
<body>
    <h2>새로운 윈도우 오픈 예제 - 구글창 열기/창 크기 및 위치 조절</h2>
    <p>window.open("URL경로", "창이름", "옵션설정", replace);</p>
    <input type="button" 
    value="구글창열기" 
    onclick="window.open('https://www.google.com','_blank','width=500, height=500, top=500, left=500')"
    >
    <hr>
    <!-- ------------------------ -->
    <h2>setTimeout()</h2>
    <p>버튼을 클릭하면 3초후에 경고 박스가 화면에 표시됩니다.</p>
    <P>setTimeout("스크립트 실행문",시간 간격);</P>
    <button onclick="showAlert()">눌러보세요</button>
    <script>
        function showAlert() {
            setTimeout(function() {
                alert("setTimeout()을 사용하여 표시됩니다.")
            },3000)
        }
    </script>
    <hr>
  <!-- ------------------------ -->
   <h2>setInterval() 예제</h2>
   <p>setInterval("스크립트 실행문",시간 간격)/clearInterval;</p>
   <div id="target">
        <p>This is a Text.</p>
   </div>
   <button onclick="changeColor()">실행</button>
   <button onclick="stopTextColor()">중지</button>

   <script>
        //var 참조변수 = setInterval(스크립트 실행문", 시간 간격)
        var id;
        function changeColor() {
            id = setInterval("flashText()",500)  // 0.5초마다 호출해서 id에 저장
        }
        function flashText() {
            var elem = document.getElementById("target")
            elem.style.color = (elem.style.color == "red")? "blue":"red"
            elem.style.backgroundColor = (elem.style.backgroundColor == "green")? "yellow":"green"
        }
        
        function stopTextColor() {
            clearInterval(id)
        }

   </script>

    
</body>
</html>
