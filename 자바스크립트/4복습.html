
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복습 - 2025/12/24일 배운내용: 기초, 변수선언, 자료형</title>
    <!-- /* javascript 외부연결은: src= , css 연결은: link= -->
    <!-- <script src="./js/second.js"></script>   -->
    
    <!-- /* 이 script는 body inline javascript있어도 되고, head 외부 javascript 있어도 상관없음 */ -->

</head>
<body>

    <button onclick="alert('안녕하세요 반갑습니다-^^-')" type="button">버튼을 누르세요</button>

    <h2>변수에는 하나의 값만 넣을 수 있습니다.</h2>
    <script>
        var box;
        box = 100;
        box = 200;
        document.write("<br>" + box);
    </script>
    <hr>

    <h3>변수 선언, 전역/지역/블록 변수</h3>
    <script>
        let x;
            function f() {
                let y;
                x = 10;
                y = 20;
                z = 30;
                if(y==20) {
                    let b = 40;
                    b++;
                    document.write("if 블록 내 블록변수 b = " + b + "<br>");
                }
                document.write("함수 f() 내 지역변수 y = " + y + "<br>");
            }
            document.write("함수 f의 자료형 = " + typeof f + "<br>");    
            f();
            document.write("전역변수 x = " + x + "<br>");
            document.write("전역변수 z = " + z);                      
    </script>
    <hr>

    <h3>자료형</h3>
    <script>
        var s;
        s = 100;
        document.write("숫자형:" + s + " type : " +typeof s + "<br>")
        s = "홍길동"
        document.write("문자형:" + s + " type : " +typeof s + "<br>")
        s = (20>10)
        document.write("논리형:" +s + " type : " +typeof s + "<br>")
        s = (10>20)
        document.write("논리형:" +s + " type : " +typeof s + "<br>")
        s = null
        document.write("Null:" +s + " type : " +typeof s + "<br>")

        var person;
        document.write("Undefined:" + person  + " type : " +typeof person + "<br>")
    </script>
    <hr>

    <h3>객체형(Object): 사물의 속성과 동작을 묶어서 표현하는 기법 - 예: 자동차 모델/색/마력과 같은 속성으로 이루어진 객체를 생성할때</h3>
    <script>
        var myCar = {model: "BMW", color: "red", hp: 100};
        document.write(myCar.model + "<br>");
        document.write(myCar.color + "<br>");
        document.write(myCar.hp + "<br>");
        document.write(typeof myCar + "<br>");
    </script>


</body>
</html>
