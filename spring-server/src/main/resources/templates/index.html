<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">Health AI</a>
        <div class="d-flex gap-2">
            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-outline-primary btn-sm">로그인</a>
            <a sec:authorize="isAnonymous()" th:href="@{/signup}" class="btn btn-primary btn-sm">회원가입</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-5">
    <section class="py-4">
        <h1 class="display-6 fw-semibold mb-3">건강검진 데이터 기반 비만 예측 서비스</h1>
        <p class="lead text-secondary mb-4">
            Spring Boot와 Flask AI 서버를 연동하여 사용자의 건강 정보를 분석합니다.
        </p>
        <div class="d-flex gap-2">
            <a th:href="@{/predict}" class="btn btn-primary">AI 예측하기</a>
            <a th:href="@{/question/list}" class="btn btn-outline-secondary">게시판</a>
        </div>
    </section>
</main>
</body>
</html>
