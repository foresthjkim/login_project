<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">Health AI</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">권한 오류</div>

    <div class="mb-4">
        <a th:href="@{/question/list}" class="btn btn-outline-secondary btn-sm">목록</a>
    </div>

    <article class="border-bottom pb-4 mb-4">
        <h1 class="h3 mb-3" th:text="${question.title}">게시글 제목</h1>
        <div class="text-secondary small mb-4">
            <span>작성자 </span><span th:text="${question.writerName}">홍길동</span>
            <span class="mx-2">|</span>
            <span th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
        </div>
        <p class="fs-6 lh-lg" style="white-space: pre-wrap;" th:text="${question.content}">게시글 내용</p>
    </article>

    <div class="d-flex gap-2"
         th:if="${question.writerUsername == #authentication.name or (question.writerUsername == null and #authorization.expression('hasRole(''ADMIN'')'))}">
        <a th:href="@{/question/{id}/edit(id=${question.id})}" class="btn btn-primary">수정</a>
        <form th:action="@{/question/{id}/delete(id=${question.id})}" method="post">
            <button type="submit" class="btn btn-danger" onclick="return confirm('게시글을 삭제하시겠습니까?')">삭제</button>
        </form>
    </div>
</main>
</body>
</html>
