<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">권한 오류</div>

        <div class="card content-card">
            <div class="card-body p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                    <div>
                        <h1 class="h2 fw-bold mb-3" th:text="${question.title}">게시글 제목</h1>
                        <div class="text-secondary small">
                            <span>작성자 </span><span th:text="${question.writerName}">홍길동</span>
                            <span class="mx-2">|</span>
                            <span th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
                        </div>
                    </div>
                    <a th:href="@{/question/list}" class="btn btn-outline-secondary btn-sm text-nowrap">목록</a>
                </div>

                <hr>

                <div class="pre-line lh-lg py-3" th:text="${question.content}">게시글 내용</div>

                <div class="d-flex flex-column flex-sm-row gap-2 pt-4 border-top"
                     th:if="${question.writerUsername == #authentication.name or (question.writerUsername == null and #authorization.expression('hasRole(''ADMIN'')'))}">
                    <a th:href="@{/question/{id}/edit(id=${question.id})}" class="btn btn-primary">수정</a>
                    <form th:action="@{/question/{id}/delete(id=${question.id})}" method="post">
                        <button type="submit" class="btn btn-outline-danger w-100" onclick="return confirm('게시글을 삭제하시겠습니까?')">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
