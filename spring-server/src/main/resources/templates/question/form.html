<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">게시글 등록</h1>
                <a th:href="@{/question/list}" class="btn btn-outline-secondary btn-sm">목록</a>
            </div>

            <form th:action="@{/question/create}" th:object="${questionRequest}" method="post" class="card card-body shadow-sm">
                <div class="mb-3">
                    <label for="title" class="form-label">제목</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{title}"></div>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label">내용</label>
                    <textarea id="content" th:field="*{content}" class="form-control" rows="10"></textarea>
                    <div class="text-danger small mt-1" th:errors="*{content}"></div>
                </div>

                <button type="submit" class="btn btn-primary">등록</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
