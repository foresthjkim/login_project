<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
            <div>
                <h1 class="h2 fw-bold mb-1">게시글 목록</h1>
                <p class="text-secondary mb-0">로그인한 사용자는 게시글을 작성할 수 있습니다.</p>
            </div>
            <a th:href="@{/question/create}" class="btn btn-primary">글쓰기</a>
        </div>

        <div th:if="${#lists.isEmpty(questions)}" class="alert alert-light border">
            등록된 게시글이 없습니다.
        </div>

        <div class="card content-card" th:if="${!#lists.isEmpty(questions)}">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-primary">
                        <tr>
                            <th>제목</th>
                            <th class="text-nowrap">작성자</th>
                            <th class="text-nowrap">작성일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="question : ${questions}">
                            <td>
                                <a th:href="@{/question/detail/{id}(id=${question.id})}"
                                   class="link-dark text-decoration-none fw-semibold"
                                   th:text="${question.title}">게시글 제목</a>
                            </td>
                            <td class="text-secondary text-nowrap" th:text="${question.writerName}">홍길동</td>
                            <td class="text-secondary text-nowrap" th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
