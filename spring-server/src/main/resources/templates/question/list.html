<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">Health AI</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">게시글 목록</h1>
        <a th:href="@{/question/create}" class="btn btn-primary">글쓰기</a>
    </div>

    <div th:if="${#lists.isEmpty(questions)}" class="alert alert-light border">
        등록된 게시글이 없습니다.
    </div>

    <div class="list-group" th:if="${!#lists.isEmpty(questions)}">
        <a th:each="question : ${questions}"
           th:href="@{/question/detail/{id}(id=${question.id})}"
           class="list-group-item list-group-item-action">
            <div class="d-flex justify-content-between gap-3">
                <strong th:text="${question.title}">게시글 제목</strong>
                <small class="text-secondary" th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</small>
            </div>
            <div class="text-secondary small mt-1">
                작성자 <span th:text="${question.writerName}">홍길동</span>
            </div>
        </a>
    </div>
</main>
</body>
</html>
