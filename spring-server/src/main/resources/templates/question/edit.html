<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="h2 fw-bold mb-1">게시글 수정</h1>
                        <p class="text-secondary mb-0">작성한 게시글의 제목과 내용을 수정합니다.</p>
                    </div>
                    <a th:href="@{/question/detail/{id}(id=${questionId})}" class="btn btn-outline-secondary btn-sm">상세</a>
                </div>

                <form th:action="@{/question/{id}/edit(id=${questionId})}" th:object="${questionRequest}" method="post" class="card content-card">
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label for="title" class="form-label">제목</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control form-control-lg">
                            <div class="text-danger small mt-1" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="content" class="form-label">내용</label>
                            <textarea id="content" th:field="*{content}" class="form-control" rows="10"></textarea>
                            <div class="text-danger small mt-1" th:errors="*{content}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">수정</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
