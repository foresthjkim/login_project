<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="text-center mb-4">
                    <h1 class="h2 fw-bold">로그인</h1>
                    <p class="text-secondary mb-0">게시판 작성과 회원 기능을 사용하려면 로그인해주세요.</p>
                </div>

                <form th:action="@{/login}" method="post" class="card content-card">
                    <div class="card-body p-4">
                        <div th:if="${param.error}" class="alert alert-danger">
                            아이디 또는 비밀번호가 올바르지 않습니다.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success">
                            로그아웃되었습니다.
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input type="text" id="username" name="username" class="form-control form-control-lg" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">로그인</button>
                        <a th:href="@{/signup}" class="btn btn-outline-secondary w-100 mt-2">회원가입</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
