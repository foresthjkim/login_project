<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="text-center mb-4">
                    <h1 class="h2 fw-bold">회원가입</h1>
                    <p class="text-secondary mb-0">아이디, 비밀번호, 이름을 입력해 계정을 생성합니다.</p>
                </div>

                <form th:action="@{/signup}" th:object="${signupRequest}" method="post" class="card content-card">
                    <div class="card-body p-4">
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <p class="mb-0" th:each="error : ${#fields.globalErrors()}" th:text="${error}">회원가입 오류</p>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input type="text" id="username" th:field="*{username}" class="form-control form-control-lg">
                            <div class="text-danger small mt-1" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control form-control-lg">
                            <div class="text-danger small mt-1" th:errors="*{password}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="name" class="form-label">이름</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control form-control-lg">
                            <div class="text-danger small mt-1" th:errors="*{name}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">가입하기</button>
                        <a th:href="@{/login}" class="btn btn-outline-secondary w-100 mt-2">로그인으로 이동</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
