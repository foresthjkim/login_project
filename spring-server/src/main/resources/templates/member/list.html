<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
            <div>
                <h1 class="h2 fw-bold mb-1">회원 목록</h1>
                <p class="text-secondary mb-0">관리자만 접근할 수 있는 회원 관리 화면입니다.</p>
            </div>
        </div>

        <div class="card content-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>아이디</th>
                            <th>이름</th>
                            <th>권한</th>
                            <th>가입일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="member : ${members}">
                            <td th:text="${member.id}">1</td>
                            <td th:text="${member.username}">user</td>
                            <td th:text="${member.name}">홍길동</td>
                            <td><span class="badge text-bg-primary" th:text="${member.role}">USER</span></td>
                            <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
