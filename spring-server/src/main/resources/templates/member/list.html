<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <h1 class="h3 mb-4">회원 목록</h1>

    <table class="table table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>아이디</th>
            <th>이름</th>
            <th>권한</th>
            <th>가입일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="member : ${members}">
            <td th:text="${member.id}">1</td>
            <td th:text="${member.username}">user</td>
            <td th:text="${member.name}">홍길동</td>
            <td th:text="${member.role}">USER</td>
            <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
