<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예측 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 form-shell">
                <div class="text-center mb-4">
                    <h1 class="h2 fw-bold">예측 결과</h1>
                    <p class="text-secondary mb-0">입력한 정보를 바탕으로 AI 서버가 반환한 결과입니다.</p>
                </div>

                <section class="card content-card">
                    <div class="card-body p-4">
                        <dl class="row mb-4">
                            <dt class="col-5">키</dt>
                            <dd class="col-7"><span th:text="${request.height}">170</span> cm</dd>

                            <dt class="col-5">몸무게</dt>
                            <dd class="col-7"><span th:text="${request.weight}">70</span> kg</dd>
                        </dl>

                        <div class="alert alert-primary mb-4">
                            비만 여부 예측 결과:
                            <strong th:text="${response.result}">정상</strong>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex">
                            <a th:href="@{/predict}" class="btn btn-primary flex-sm-fill">다시 예측하기</a>
                            <a th:href="@{/}" class="btn btn-outline-secondary flex-sm-fill">메인으로</a>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
