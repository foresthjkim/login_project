<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예측 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg border-bottom bg-white">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">Health AI</a>
        <a th:href="@{/predict}" class="btn btn-outline-primary btn-sm">다시 예측</a>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h3 mb-4">예측 결과</h1>

            <section class="card card-body shadow-sm">
                <dl class="row mb-4">
                    <dt class="col-5">키</dt>
                    <dd class="col-7"><span th:text="${request.height}">170</span> cm</dd>

                    <dt class="col-5">몸무게</dt>
                    <dd class="col-7"><span th:text="${request.weight}">70</span> kg</dd>
                </dl>

                <div class="alert alert-primary mb-0">
                    비만 여부 예측 결과:
                    <strong th:text="${response.result}">정상</strong>
                </div>
            </section>
        </div>
    </div>
</main>
</body>
</html>
