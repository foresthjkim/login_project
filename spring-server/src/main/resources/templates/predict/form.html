<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 비만 예측</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 form-shell">
                <div class="text-center mb-4">
                    <span class="hero-badge mb-3">비회원 사용 가능</span>
                    <h1 class="h2 fw-bold">AI 비만 예측</h1>
                    <p class="text-secondary mb-0">
                        키와 몸무게를 입력하면 Flask AI 서버가 비만 여부를 예측합니다.
                    </p>
                </div>

                <form th:action="@{/predict}" th:object="${predictRequest}" method="post" class="card content-card">
                    <div class="card-body p-4">
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <p class="mb-0" th:each="error : ${#fields.globalErrors()}" th:text="${error}">예측 오류</p>
                        </div>

                        <div class="mb-3">
                            <label for="height" class="form-label">키(cm)</label>
                            <input type="number" step="0.1" id="height" th:field="*{height}" class="form-control form-control-lg" placeholder="예: 170">
                            <div class="text-danger small mt-1" th:errors="*{height}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="weight" class="form-label">몸무게(kg)</label>
                            <input type="number" step="0.1" id="weight" th:field="*{weight}" class="form-control form-control-lg" placeholder="예: 70">
                            <div class="text-danger small mt-1" th:errors="*{weight}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">예측하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
