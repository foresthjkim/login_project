<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 비만 예측</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg border-bottom bg-white">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">Health AI</a>
        <a th:href="@{/question/list}" class="btn btn-outline-secondary btn-sm">게시판</a>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h3 mb-4">AI 비만 예측</h1>

            <form th:action="@{/predict}" th:object="${predictRequest}" method="post" class="card card-body shadow-sm">
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                    <p class="mb-0" th:each="error : ${#fields.globalErrors()}" th:text="${error}">예측 오류</p>
                </div>

                <div class="mb-3">
                    <label for="height" class="form-label">키(cm)</label>
                    <input type="number" step="0.1" id="height" th:field="*{height}" class="form-control" placeholder="예: 170">
                    <div class="text-danger small mt-1" th:errors="*{height}"></div>
                </div>

                <div class="mb-4">
                    <label for="weight" class="form-label">몸무게(kg)</label>
                    <input type="number" step="0.1" id="weight" th:field="*{weight}" class="form-control" placeholder="예: 70">
                    <div class="text-danger small mt-1" th:errors="*{weight}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">예측하기</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
